<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SmartAnchor v5.0</title>
    
    <!-- PWA & Mobile App Settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartAnchor">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ocean: { 900: '#0f172a', 800: '#1e293b', 700: '#334155', 500: '#0ea5e9', 400: '#38bdf8' },
                        alert: { 500: '#ef4444', 900: '#7f1d1d' },
                        safe: { 500: '#10b981', 900: '#064e3b' }
                    },
                    spacing: {
                        'safe-top': 'env(safe-area-inset-top)',
                        'safe-bottom': 'env(safe-area-inset-bottom)',
                        'safe-left': 'env(safe-area-inset-left)',
                        'safe-right': 'env(safe-area-inset-right)',
                    }
                }
            }
        }
    </script>

    <!-- Styles de base -->
    <style>
        html {
            overscroll-behavior: none; /* Disable pull-to-refresh/rubber-banding */
            height: 100%;
        }
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            touch-action: manipulation; /* Remove 300ms tap delay */
            user-select: none; /* Disable text selection */
            -webkit-user-select: none;
            height: 100%;
            overflow: hidden; /* Prevent body scroll, handle inside App */
        }
        
        /* Restore text selection for inputs */
        input, textarea {
            user-select: text;
            -webkit-user-select: text;
        }

        /* Hide Scrollbars completely but allow scrolling */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <!-- Import Map -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "@google/generative-ai": "https://esm.sh/@google/generative-ai@0.21.0",
    "lucide-react": "https://esm.sh/lucide-react@0.300.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "vite": "https://aistudiocdn.com/vite@^7.2.4",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
